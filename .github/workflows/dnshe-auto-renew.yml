name: DNSHE Auto Renew

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ 新增：安装依赖（必须在运行任何 Python 脚本之前）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run renewal check
        env:
          DNSHE_API_KEY: ${{ secrets.DNSHE_API_KEY }}
          DNSHE_API_SECRET: ${{ secrets.DNSHE_API_SECRET }}
          DNSHE_DOMAINS: ${{ vars.DNSHE_DOMAINS }}
        run: |
          python scripts/dnshe_auto_renew.py --state state/domains-state.json

      - name: Commit updated renewal state
        run: |

          # 配置 git 身份
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 先把文件加入暂存区（不管是不是新文件，add 都不会报错）
          git add state/domains-state.json
          
          # 检测「暂存区和 HEAD 的差异」：不管是新文件还是已跟踪文件的修改，都能检测到
          #if git diff --quiet -- state/domains-state.json; then
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          
          git commit -m "chore: update DNSHE renewal state"
          git push

      # === 新增的通知步骤 ===
      - name: Send WeCom Notification
        if: always()  # ✅ 无论成功/失败都发通知
        env:
          STATUS: ${{ job.status }}
          # ✅ 修正后的 RUN_URL 写法
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: |
          python scripts/notify.py
